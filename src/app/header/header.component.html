<header class="fixed top-0 w-full z-50 sticky bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none">
  <div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto font-public-sans tracking-tight">
    <!-- Brand Logo -->
    <a class="text-2xl font-black tracking-tighter text-slate-900 dark:text-slate-50" routerLink="/" (click)="viewAll()">E-kart</a>
    
    <!-- Navigation Links -->
    <nav class="hidden md:flex items-center gap-8">
      <a class="text-slate-900 dark:text-slate-50 font-bold border-b-2 border-slate-900 dark:border-slate-50 pb-1 hover:opacity-80 transition-opacity duration-300 cursor-pointer" (click)="viewAll()">All Products</a>
      
      <!-- Categories Mega-Menu -->
      <div class="relative group h-full flex items-center">
        <button class="text-slate-500 dark:text-slate-400 font-medium hover:text-slate-900 dark:hover:text-slate-100 hover:opacity-80 transition-opacity duration-300 flex items-center gap-1 group-hover:text-primary">
          Categories
          <span class="material-symbols-outlined text-sm transition-transform group-hover:rotate-180">expand_more</span>
        </button>
        
        <!-- Dropdown Desktop -->
        <div class="absolute top-[100%] left-0 pt-4 opacity-0 translate-y-2 invisible group-hover:opacity-100 group-hover:translate-y-0 group-hover:visible transition-all duration-300 z-[100]">
          <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl p-6 w-[600px] backdrop-blur-xl">
            <div class="grid grid-cols-2 gap-8">
              <div *ngFor="let group of categoryGroups" class="space-y-4">
                <div class="flex items-center gap-2 text-primary font-black uppercase tracking-widest text-[10px]">
                  <span class="material-symbols-outlined text-sm">{{ group.icon }}</span>
                  {{ group.name }}
                </div>
                <div class="grid grid-cols-1 gap-4">
                  <div *ngFor="let section of group.sections" class="space-y-2">
                    <div class="text-[11px] font-bold text-slate-400 uppercase tracking-tighter">{{ section.title }}</div>
                    <ul class="space-y-1.5">
                      <li *ngFor="let link of section.links">
                        <button (click)="selectCategory(link.slug)" class="text-xs text-slate-600 dark:text-slate-300 hover:text-primary transition-colors block text-left w-full">
                          {{ link.name }}
                        </button>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button (click)="viewOffers()" class="text-slate-500 dark:text-slate-400 font-medium hover:text-slate-900 dark:hover:text-slate-100 hover:opacity-80 transition-opacity duration-300 cursor-pointer">Offers & Sales</button>
      <a class="text-slate-500 dark:text-slate-400 font-medium hover:text-slate-900 dark:hover:text-slate-100 hover:opacity-80 transition-opacity duration-300 cursor-pointer" routerLink="/cart">Shopping Cart</a>
    </nav>

    <!-- Search Bar -->
    <div class="flex-1 max-w-md mx-8">
      <div class="relative group">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
        <input 
          class="w-full bg-surface-container-lowest border-none rounded-lg pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-primary-fixed outline-none transition-all duration-300" 
          placeholder="Search for products, brands, and more..." 
          type="text"
          (input)="onSearchChange($event)"
          (keyup.enter)="onSearchEnter($event)"
        />
      </div>
    </div>

    <!-- Action Icons -->
    <div class="flex items-center gap-6">
      <!-- User Account Hub -->
      <div class="relative">
        <button 
          *ngIf="!currentUser" 
          routerLink="/auth"
          class="flex items-center gap-2 px-4 py-2 bg-primary/10 text-primary border border-primary/20 rounded-lg hover:bg-primary hover:text-white transition-all duration-300 text-[10px] font-black uppercase tracking-widest"
        >
          <span class="material-symbols-outlined text-sm">login</span>
          Login / Sign In
        </button>

        <div *ngIf="currentUser" class="relative group">
          <button 
            (click)="toggleProfileMenu()"
            class="w-10 h-10 rounded-full bg-surface-container-highest border border-outline-variant/20 flex items-center justify-center hover:border-primary transition-all overflow-hidden"
          >
            <span *ngIf="!currentUser.user_metadata?.['avatar_url']" class="text-xs font-bold text-primary">
              {{ (currentUser.email?.[0] || 'U') | uppercase }}
            </span>
            <img *ngIf="currentUser.user_metadata?.['avatar_url']" [src]="currentUser.user_metadata?.['avatar_url']" alt="User Avatar" title="User Account" class="w-full h-full object-cover">
            
            <!-- Incomplete Warning Badge -->
            <span 
              *ngIf="isProfileIncomplete"
              class="absolute -top-1 -right-1 w-4 h-4 bg-error text-white text-[10px] flex items-center justify-center rounded-full border-2 border-white dark:border-slate-900 font-black animate-pulse"
              title="Profile Incomplete: Shipping Details Mandatory"
            >!</span>
          </button>

          <!-- Account Dropdown -->
          <div 
            *ngIf="isProfileMenuOpen"
            class="absolute top-full right-0 mt-3 w-56 bg-white dark:bg-slate-900 border border-outline-variant/10 rounded-xl shadow-2xl p-4 backdrop-blur-xl z-[150]"
          >
            <div class="mb-4 pb-4 border-b border-outline-variant/10">
              <div class="text-[10px] font-bold text-primary uppercase tracking-widest mb-1">My Account</div>
              <div class="text-xs font-bold text-on-surface truncate">{{ currentUser.email }}</div>
            </div>
            <ul class="space-y-2">
              <li>
                <button class="w-full text-left text-xs font-medium text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2">
                  <span class="material-symbols-outlined text-sm">settings</span>
                  Account Settings
                </button>
              </li>
              <li>
                <button (click)="logout()" class="w-full text-left text-xs font-black text-error hover:opacity-80 transition-colors flex items-center gap-2 uppercase tracking-widest mt-2">
                  <span class="material-symbols-outlined text-sm">logout</span>
                  Logout
                </button>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <button class="flex flex-col items-center hover:opacity-80 transition-opacity duration-300 text-slate-900 dark:text-slate-100">
        <span class="material-symbols-outlined">favorite</span>
      </button>
      <button class="flex flex-col items-center hover:opacity-80 transition-opacity duration-300 text-slate-900 dark:text-slate-100 relative" routerLink="/cart">
        <span class="material-symbols-outlined">shopping_bag</span>
        <span class="absolute -top-2 -right-2 bg-primary text-on-primary text-[10px] font-bold px-1.5 py-0.5 rounded-full" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </button>
    </div>
  </div>
</header>
